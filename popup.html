<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>SiYuan Flashcard Tracker Stats</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --surface: #252538;
      --text: #cdd6f4;
      --accent: #cba6f7;
      --muted: #6c7086;
      --again: #f38ba8;
      --hard: #fab387;
      --good: #a6e3a1;
      --easy: #89b4fa;
      --border-radius: 8px;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 16px;
      width: 350px;
      box-sizing: border-box;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 0;
      color: var(--accent);
    }

    .clear-btn {
      background: transparent;
      border: none;
      color: var(--again);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background-color 0.2s;
    }

    .clear-btn:hover {
      background-color: rgba(243, 139, 168, 0.1);
    }

    .navigation-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      background: var(--surface);
      border: 1px solid rgba(108, 112, 134, 0.3);
      color: var(--text);
      padding: 8px 12px;
      border-radius: var(--border-radius);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s ease-in-out;
    }

    .tab:hover {
      border-color: var(--accent);
    }

    .tab.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 600;
    }

    .view-container {
      max-height: 300px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 2px;
    }

    .view-container::-webkit-scrollbar {
      width: 4px;
    }

    .view-container::-webkit-scrollbar-thumb {
      background: var(--muted);
      border-radius: 4px;
    }

    .data-row {
      background: var(--surface);
      padding: 12px;
      border-radius: var(--border-radius);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .meta-title {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .meta-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .badge-container {
      display: flex;
      gap: 4px;
    }

    .badge {
      font-size: 0.72rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 700;
      color: #11111b;
    }

    .badge.Again { background-color: var(--again); }
    .badge.Hard { background-color: var(--hard); }
    .badge.Good { background-color: var(--good); }
    .badge.Easy { background-color: var(--easy); }
  </style>
</head>
<body>

  <header>
    <h2>SiYuan Tracker</h2>
    <button id="clearData" class="clear-btn" aria-label="Daten zurücksetzen">Reset</button>
  </header>

  <nav class="navigation-tabs" role="tablist">
    <button id="tabDate" class="tab active" role="tab" aria-selected="true">Nach Datum</button>
    <button id="tabRating" class="tab" role="tab" aria-selected="false">Nach Bewertung</button>
  </nav>

  <main id="output" class="view-container"></main>

  <script src="popup.js"></script>
</body>
</html>
